name: release
on:
  push:
    tags:
      # Pattern: soly-v0.2.0, pi-ask-v0.1.0, etc. — one tag per package version.
      - "*-v*"

jobs:
  publish:
    runs-on: docker
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - uses: https://code.forgejo.org/oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Run tests before publish
        run: bun test

      # Tag-based publish: e.g. tag "soly-v0.2.1" → publish packages/soly
      - name: Determine package from tag
        id: detect
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG="${TAG%%-v*}"
          VER="${TAG##*-v}"
          echo "package=${PKG}" >> "$GITHUB_OUTPUT"
          echo "version=${VER#v}" >> "$GITHUB_OUTPUT"
      - name: Verify package version matches tag
        run: |
          PKG="${{ steps.detect.outputs.package }}"
          VER="${{ steps.detect.outputs.version }}"
          cd "packages/${PKG}"
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "${PKG_VER}" != "${VER}" ]; then
            echo "::error::package.json version (${PKG_VER}) doesn't match tag (${VER})"
            exit 1
          fi

      # Auth: use PUBLISH_TOKEN (Personal Access Token from forgejo secrets).
      # Required scope: write:packages, read:user, write:repository
      # Set in: forgejo → repo Settings → Secrets → PUBLISH_TOKEN
      #
      # We write a .npmrc at the MONOREPO ROOT (not in a workspace package)
      # because:
      #  - npm ignores .npmrc inside workspace packages ("ignoring workspace config")
      #  - `npm config set` refuses to run inside a workspace ("ENOWORKSPACES")
      # The root .npmrc is honored by npm from any subdirectory.
      - name: Configure npm auth (root .npmrc)
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          cd "packages/${{ steps.detect.outputs.package }}"
          REGISTRY=$(node -p "require('./package.json').publishConfig.registry")
          REGISTRY_PATH=$(echo "$REGISTRY" | sed 's|http://||' | sed 's|/$||')
          # Strip whitespace from token in case of accidental spaces/newlines
          TOKEN=$(echo -n "$PUBLISH_TOKEN" | tr -d '[:space:]')
          if [ -z "$TOKEN" ]; then
            echo "::error::PUBLISH_TOKEN secret is empty or not set!"
            exit 1
          fi
          # Debug: test the token via direct API call
          echo "--- testing token via API ---"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token $TOKEN" "http://git.local.stbl/api/v1/user")
          echo "  GET /api/v1/user with token → HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Token rejected by /api/v1/user (HTTP $HTTP_CODE). Check scope and expiry."
            # Also try Basic auth variant (some forgejo versions expect different format)
            HTTP_CODE2=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $TOKEN" "http://git.local.stbl/api/v1/user")
            echo "  GET /api/v1/user with Bearer → HTTP $HTTP_CODE2"
            exit 1
          fi
          # Test write:packages scope via PUT to a fake package
          echo "--- testing publish endpoint ---"
          HTTP_PUB=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token $TOKEN" -X PUT "http://git.local.stbl/api/packages/lowern1ght/npm/.test-$$" --data-binary "{\"name\":\"x\",\"version\":\"0.0.0\"}")
          echo "  PUT /api/packages/.../npm/.test → HTTP $HTTP_PUB"
          # Use printf; write to monorepo root. Note: use $VAR (no braces) for shell
          # vars — GitHub Actions treats ${VAR} as a workflow expression.
          cd ../..
          printf "registry=%s\n//%s/:_authToken=%s\n" "$REGISTRY" "$REGISTRY_PATH" "$TOKEN" > .npmrc
          chmod 600 .npmrc
          echo "--- .npmrc (token masked) ---"
          sed 's/_authToken=.*/_authToken=***MASKED***/' .npmrc

      - name: Publish to forgejo packages
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          cd "packages/${{ steps.detect.outputs.package }}"
          REGISTRY=$(node -p "require('./package.json').publishConfig.registry")
          echo "Publishing ${{ steps.detect.outputs.package }}@${{ steps.detect.outputs.version }}"
          npm publish --registry="$REGISTRY" --access public
          echo "✓ published"

      - name: Cleanup .npmrc
        if: always()
        run: rm -f .npmrc
