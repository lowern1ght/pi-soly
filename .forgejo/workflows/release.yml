name: release
on:
  push:
    tags:
      # Pattern: soly-v0.2.0, pi-ask-v0.1.0, etc. — one tag per package version.
      - "*-v*"

jobs:
  publish:
    runs-on: docker
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - uses: https://code.forgejo.org/oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Run tests before publish
        run: bun test

      # Tag-based publish: e.g. tag "soly-v0.2.1" → publish packages/soly
      - name: Determine package from tag
        id: detect
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG="${TAG%%-v*}"
          VER="${TAG##*-v}"
          echo "package=${PKG}" >> "$GITHUB_OUTPUT"
          echo "version=${VER#v}" >> "$GITHUB_OUTPUT"
      - name: Verify package version matches tag
        run: |
          PKG="${{ steps.detect.outputs.package }}"
          VER="${{ steps.detect.outputs.version }}"
          cd "packages/${PKG}"
          # Compare against both package.json and jsr.json (in case of drift)
          PKG_VER_PKG=$(node -p "require('./package.json').version")
          PKG_VER_JSR=$(node -p "require('./jsr.json').version" 2>/dev/null || echo "$PKG_VER_PKG")
          if [ "${PKG_VER_PKG}" != "${VER}" ] || [ "${PKG_VER_JSR}" != "${VER}" ]; then
            echo "::error::version mismatch: tag=${VER} package.json=${PKG_VER_PKG} jsr.json=${PKG_VER_JSR}"
            exit 1
          fi

      # Publish to JSR.io (https://jsr.io)
      # Free, no Pro plan needed, supports any GitHub user/org as scope.
      # Set in: forgejo → repo Settings → Secrets → JSR_TOKEN
      # Token type: "publish" with scope for the packages you want.
      # Get one at: https://jsr.io/settings/access-tokens
      - name: Publish to JSR
        env:
          JSR_TOKEN: ${{ secrets.JSR_TOKEN }}
        run: |
          cd "packages/${{ steps.detect.outputs.package }}"
          if [ -z "$JSR_TOKEN" ]; then
            echo "::error::JSR_TOKEN secret is empty or not set!"
            exit 1
          fi
          # Quick connectivity check
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://jsr.io/")
          echo "  HEAD jsr.io → HTTP $HTTP_CODE"
          echo "--- jsr.json ---"
          cat jsr.json
          echo "--- publishing ---"
          # JSR CLI: npx --yes jsr publish --token <token>
          npx --yes jsr@latest publish --token "$JSR_TOKEN"
          echo "✓ published"
