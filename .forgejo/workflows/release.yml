name: release
on:
  push:
    tags:
      # Pattern: soly-v0.2.0, pi-ask-v0.1.0, etc. — one tag per package version.
      - "*-v*"

jobs:
  publish:
    runs-on: docker
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - uses: https://code.forgejo.org/oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Run tests before publish
        run: bun test

      # Tag-based publish: e.g. tag "soly-v0.2.1" → publish packages/soly
      - name: Determine package from tag
        id: detect
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG="${TAG%%-v*}"
          VER="${TAG##*-v}"
          echo "package=${PKG}" >> "$GITHUB_OUTPUT"
          echo "version=${VER#v}" >> "$GITHUB_OUTPUT"
      - name: Verify package version matches tag
        run: |
          PKG="${{ steps.detect.outputs.package }}"
          VER="${{ steps.detect.outputs.version }}"
          cd "packages/${PKG}"
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "${PKG_VER}" != "${VER}" ]; then
            echo "::error::package.json version (${PKG_VER}) doesn't match tag (${VER})"
            exit 1
          fi

      # Auth for npmjs.com via PUBLISH_TOKEN (npm access token).
      # Set in: forgejo → repo Settings → Secrets → PUBLISH_TOKEN
      # Token type: "Automation" or "Publish" (NOT legacy "Read and Publish")
      # Get one at: https://www.npmjs.com/settings/~/tokens
      - name: Configure npm auth
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          cd "packages/${{ steps.detect.outputs.package }}"
          REGISTRY=$(node -p "require('./package.json').publishConfig.registry")
          REGISTRY_HOST=$(echo "$REGISTRY" | sed -E 's|^https?://||' | sed 's|/$||')
          # Strip whitespace from token
          TOKEN=$(echo -n "$PUBLISH_TOKEN" | tr -d '[:space:]')
          if [ -z "$TOKEN" ]; then
            echo "::error::PUBLISH_TOKEN secret is empty or not set!"
            exit 1
          fi
          # Quick connectivity check (HEAD on the registry root)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://$REGISTRY_HOST")
          echo "  HEAD $REGISTRY_HOST → HTTP $HTTP_CODE"
          # Write .npmrc at monorepo root (workspaces block package-level config)
          cd ../..
          printf "registry=%s\n//%s/:_authToken=%s\n" "$REGISTRY" "$REGISTRY_HOST" "$TOKEN" > .npmrc
          chmod 600 .npmrc
          echo "--- .npmrc (token masked) ---"
          sed 's/_authToken=.*/_authToken=***MASKED***/' .npmrc

      - name: Publish to npmjs.com
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          cd "packages/${{ steps.detect.outputs.package }}"
          REGISTRY=$(node -p "require('./package.json').publishConfig.registry")
          echo "Publishing ${{ steps.detect.outputs.package }}@${{ steps.detect.outputs.version }} → $REGISTRY"
          npm publish --access public
          echo "✓ published"

      - name: Cleanup .npmrc
        if: always()
        run: rm -f .npmrc
