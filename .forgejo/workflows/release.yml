name: release
on:
  push:
    tags:
      # Pattern: soly-v0.2.0, pi-ask-v0.1.0, etc. — one tag per package version.
      # Bump the package version in package.json, commit, then tag.
      # The workflow only publishes the package whose name matches the tag prefix.
      - "*-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Run tests before publish
        run: bun test

      # Publish each package whose version matches the tag.
      # We use the existing "npm-publisher" runner/agent the user has set up
      # in their forgejo runner. Adjust the call below to match its actual
      # name/inputs (e.g. a custom action or a script invoked via `uses: ./`).
      - name: Determine package from tag
        id: detect
        run: |
          # Tag like "soly-v0.2.0" → package=soly, version=v0.2.0
          TAG="${GITHUB_REF_NAME}"
          PKG="${TAG%%-v*}"
          VER="${TAG##*-v}"
          echo "package=${PKG}" >> "$GITHUB_OUTPUT"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
      - name: Verify package version matches tag
        run: |
          PKG="${{ steps.detect.outputs.package }}"
          VER="${{ steps.detect.outputs.version }}"
          PKG_VER=$(node -p "require('./packages/${PKG}/package.json').version")
          if [ "${PKG_VER}" != "${VER#v}" ]; then
            echo "::error::package.json version (${PKG_VER}) doesn't match tag (${VER#v})"
            exit 1
          fi
      # ↓↓↓ replace this step with your npm-publisher agent / action call
      # e.g. a custom action:
      #   - uses: your-org/npm-publisher-action@v1
      #     with:
      #       package: packages/${{ steps.detect.outputs.package }}
      #       registry: ${{ vars.NPM_REGISTRY }}
      #       token: ${{ secrets.PUBLISH_TOKEN }}
      # OR a script:
      #   - run: ./scripts/publish.sh ${{ steps.detect.outputs.package }}
      - name: Publish to npm (via your agent)
        env:
          PACKAGE: ${{ steps.detect.outputs.package }}
        run: |
          echo "Would publish packages/${PACKAGE}/ to http://git.local.stbl/api/packages/<org>/npm/"
          echo "Replace this step with your npm-publisher agent call."
          # Example (if your agent is a script):
          #   ./agents/npm-publisher/run.sh packages/${PACKAGE}
