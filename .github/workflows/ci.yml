name: ci
on:
  push:
    branches: [master]
    tags: ["*-v*"]
  pull_request:
    branches: [master]

jobs:
  test:
    # Self-hosted runner on the user's machine.
    # Requires: labels (self-hosted, linux, x64) — these are the defaults
    # added by ./config.sh. Bun + node are pre-installed.
    runs-on: self-hosted
    timeout-minutes: 5
    # Node 20 actions are deprecated; force Node 24 for all JS actions.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Verify tools
        run: |
          bun --version
          node --version
      - name: Install
        run: bun install --frozen-lockfile
      - name: Run tests
        run: bun test
      - name: Typecheck
        run: bun run typecheck

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: self-hosted
    timeout-minutes: 5
    # GitHub Environment "npm-publish" — its secrets (NPM_TOKEN) are
    # exposed to this job only. Add NPM_TOKEN in
    # Settings → Environments → npm-publish → Secrets.
    environment: npm-publish
    # Node 20 actions are deprecated; force Node 24 for all JS actions.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Verify tools
        run: |
          bun --version
          node --version
      - name: Install
        run: bun install --frozen-lockfile
      - name: Run tests before publish
        run: bun test

      # Tag-based publish: e.g. tag "pi-soly-v0.2.1" → publish packages/pi-soly
      - name: Determine package from tag
        id: detect
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG="${TAG%%-v*}"
          VER="${TAG##*-v}"
          echo "package=${PKG}" >> "$GITHUB_OUTPUT"
          echo "version=${VER#v}" >> "$GITHUB_OUTPUT"
      - name: Verify package version matches tag
        run: |
          PKG="${{ steps.detect.outputs.package }}"
          VER="${{ steps.detect.outputs.version }}"
          cd "packages/${PKG}"
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "${PKG_VER}" != "${VER}" ]; then
            echo "::error::package.json version (${PKG_VER}) doesn't match tag (${VER})"
            exit 1
          fi

      # Auth: NPM_TOKEN comes from environment "npm-publish" secrets.
      # We write .npmrc at the monorepo root because:
      #  - npm ignores .npmrc inside workspace packages
      #  - `npm config set` refuses to run inside workspaces
      - name: Configure npm auth (root .npmrc)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd "packages/${{ steps.detect.outputs.package }}"
          REGISTRY=$(node -p "require('./package.json').publishConfig.registry")
          REGISTRY_HOST=$(echo "$REGISTRY" | sed -E 's|^https?://||' | sed 's|/$||')
          TOKEN=$(echo -n "$NPM_TOKEN" | tr -d '[:space:]')
          if [ -z "$TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is empty or not set!"
            exit 1
          fi
          cd ../..
          printf "registry=%s\n//%s/:_authToken=%s\n" "$REGISTRY" "$REGISTRY_HOST" "$TOKEN" > .npmrc
          chmod 600 .npmrc
          echo "--- .npmrc (token masked) ---"
          sed 's/_authToken=.*/_authToken=***MASKED***/' .npmrc

      - name: Publish to npmjs.com
        run: |
          cd "packages/${{ steps.detect.outputs.package }}"
          REGISTRY=$(node -p "require('./package.json').publishConfig.registry")
          echo "Publishing ${{ steps.detect.outputs.package }}@${{ steps.detect.outputs.version }} → $REGISTRY"
          npm publish --access public
          echo "✓ published"

      - name: Cleanup .npmrc
        if: always()
        run: rm -f .npmrc
